<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Cine-Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="enter-gate">
        <div class="gate-content">
            <h1>CINE-HUB</h1>
            <button id="btn-enter">Click to Enter</button>
        </div>
    </div>
    
    <div id="intro-screen">
        <video id="intro-video" playsinline>
            <source src="Netflix.mp4" type="video/mp4">
        </video>
    </div>

    <nav class="sidebar">
        <div class="brand-logo">C</div>
        <div class="nav-links">
            <a href="#" class="nav-btn" data-target="search" title="Search"><i class="fa-solid fa-magnifying-glass"></i></a>
            <a href="#" class="nav-btn active" data-target="home" title="Home"><i class="fa-solid fa-house"></i></a>
            <a href="#" class="nav-btn" data-target="series" title="TV Shows"><i class="fa-solid fa-tv"></i></a>
            <a href="#" class="nav-btn" data-target="movies" title="Movies"><i class="fa-solid fa-film"></i></a>
            <a href="#" class="nav-btn" data-target="trending" title="New & Popular"><i class="fa-solid fa-fire"></i></a>
            <a href="#" class="nav-btn" data-target="watchlist" title="My List"><i class="fa-solid fa-plus"></i></a>
            <a href="#" class="nav-btn" data-target="random" title="Surprise Me"><i class="fa-solid fa-shuffle"></i></a>
        </div>
    </nav>

    <div id="search-overlay" class="search-overlay">
        <div class="search-header">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search-input" placeholder="Search movies, shows, genres...">
            <button id="close-search"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="search-results" class="grid-layout"></div>
    </div>

    <main class="content">
        <div id="view-home" class="view active">
            <section class="hero" id="home-hero">
                <div class="hero-bg">
                    <img id="hero-img" src="" alt="">
                </div>
                <div class="hero-vignette"></div>
                <div class="hero-content">
                    <div class="hero-brand"><i class="fa-solid fa-n"></i> SERIES</div>
                    <h1 id="hero-title"></h1>
                    <div class="hero-badge-row">
                        <div class="top-10-badge">TOP<br>10</div>
                        <span id="hero-rank-text">#1 in TV Shows Today</span>
                    </div>
                    <p id="hero-desc"></p>
                    <div class="hero-actions">
                        <button class="btn-play hero-play-btn"><i class="fa-solid fa-play"></i> Play</button>
                        <button class="btn-info hero-info-btn"><i class="fa-solid fa-circle-info"></i> More info</button>
                        <button class="btn-icon hero-dl-btn" title="Download"><i class="fa-solid fa-download"></i></button>
                    </div>
                </div>
            </section>
            <div class="rows-container" id="home-rows"></div>
        </div>

        <div id="view-series" class="view"><h1 class="page-title">TV Shows</h1><div class="grid-layout" id="series-grid"></div></div>
        <div id="view-movies" class="view"><h1 class="page-title">Movies</h1><div class="grid-layout" id="movies-grid"></div></div>
        <div id="view-trending" class="view"><h1 class="page-title">Trending Now</h1><div class="grid-layout" id="trending-grid"></div></div>
        <div id="view-watchlist" class="view"><h1 class="page-title">My List</h1><div class="grid-layout" id="watchlist-grid"></div></div>
    </main>

    <div id="details-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-hero">
                <img id="modal-backdrop" src="" alt="">
                <div class="modal-hero-fade"></div>
                <div class="modal-hero-content">
                    <h2 id="modal-title"></h2>
                    <div class="modal-actions-row">
                        <button id="modal-play" class="btn-play"><i class="fa-solid fa-play"></i> Play</button>
                        <button id="modal-download" class="btn-icon" title="Download"><i class="fa-solid fa-download"></i></button>
                        <button id="modal-watch-later" class="btn-icon" title="Add to List"><i class="fa-solid fa-plus"></i></button>
                        <button id="modal-like" class="btn-icon"><i class="fa-regular fa-thumbs-up"></i></button>
                        <button id="modal-dislike" class="btn-icon"><i class="fa-regular fa-thumbs-down"></i></button>
                        <span id="like-count" class="like-counter">0</span>
                    </div>
                </div>
            </div>
            
            <div class="modal-body">
                <div class="modal-left">
                    <div class="modal-meta">
                        <span class="match-score">98% Match</span>
                        <span id="modal-date"></span>
                        <span id="modal-runtime" class="rating-box"></span>
                        <span class="hd-box">HD</span>
                    </div>
                    <p id="modal-desc"></p>
                </div>
                <div class="modal-right">
                    <span class="cast-label">Cast</span>
                    <div id="modal-cast" class="cast-list"></div>
                </div>
            </div>

            <div id="series-selector" class="series-section hidden">
                <div class="season-header">
                    <h3 class="section-title">Episodes</h3>
                    <select id="season-select" class="premium-select"></select>
                </div>
                <div id="episodes-list" class="episodes-list"></div>
            </div>

            <div class="comments-section">
                <h3 class="section-title">Community Comments</h3>
                <div class="comment-input">
                    <input type="text" id="new-comment" placeholder="Add a public comment...">
                    <button id="post-comment"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
                <div id="comments-list"></div>
            </div>
        </div>
    </div>

    <div id="player-overlay" class="player-overlay">
        <div class="player-header">
            <button id="close-player"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 id="player-title">Now Playing</h2>
            <div class="player-controls">
                <button id="mark-finished" class="btn-info"><i class="fa-solid fa-check"></i> Mark Finished</button>
            </div>
        </div>
        <iframe id="video-frame" src="" frameborder="0" allowfullscreen></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
