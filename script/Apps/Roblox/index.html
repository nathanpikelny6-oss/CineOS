<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <iframe 
        src="https://cine-browser-2.b-cdn.net/embed.html?url=https://nowgg.fun/apps/a/19900/b.html" 
        allow="autoplay; fullscreen; microphone; camera; display-capture" 
        allowfullscreen>
    </iframe>
</body>
</html>
