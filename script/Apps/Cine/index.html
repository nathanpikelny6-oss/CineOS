<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Visual Test</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #0D1117;
            color: #E6EDF3;
            text-align: center;
            padding: 20px;
        }
        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }
        .card {
            background-color: #161B22;
            border-radius: 8px;
            padding: 10px;
            width: 150px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .card img {
            width: 100%;
            border-radius: 6px;
        }
        .card h3 {
            font-size: 14px;
            margin: 10px 0 0 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .success { color: #4ade80; }
        .error { color: #f85149; }
    </style>
</head>
<body>

    <h2>Testing Your Personal Cloudflare Proxy</h2>
    <p id="status">Fetching movies...</p>
    
    <div class="grid" id="movie-grid"></div>

    <script>
        const API_KEY = '3a73619bbb8fc6d47742d1b5b2b707b5';
        
        // YOUR NEW PROXY + THE TMDB URL
        const myProxy = 'https://cine-hub.codynutkisslover.workers.dev/';
        const targetUrl = `https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}`;
        
        const finalUrl = myProxy + targetUrl;

        async function testProxy() {
            try {
                const response = await fetch(finalUrl);
                
                if (!response.ok) throw new Error("Network response was not ok");
                
                const data = await response.json();
                
                document.getElementById('status').innerHTML = `<span class="success">✅ Successfully loaded ${data.results.length} movies!</span>`;
                
                const grid = document.getElementById('movie-grid');
                grid.innerHTML = ''; // Clear loading text

                // Loop through the movies and create cards
                data.results.forEach(movie => {
                    const imageUrl = movie.poster_path 
                        ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` 
                        : 'https://via.placeholder.com/500x750?text=No+Image';

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${imageUrl}" alt="${movie.title}">
                        <h3>${movie.title}</h3>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                document.getElementById('status').innerHTML = `<span class="error">❌ Failed to load movies: ${error.message}</span>`;
            }
        }

        testProxy();
    </script>

</body>
</html>
