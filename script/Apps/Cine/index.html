<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinehub | Premium Streaming</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="intro-screen">
        <video id="intro-video" muted playsinline>
            <source src="Netflix.mp4" type="video/mp4">
        </video>
    </div>

    <nav class="sidebar">
        <div class="logo"><i class="fa-solid fa-n"></i></div>
        <div class="nav-links">
            <a href="#" class="active" title="Home"><i class="fa-solid fa-house"></i></a>
            <a href="#" id="btn-random" title="Surprise Me"><i class="fa-solid fa-dice"></i></a>
            <a href="#" id="btn-watch-later" title="Watch Later"><i class="fa-solid fa-clock"></i></a>
            <a href="#" id="btn-crunchyroll" title="Anime"><i class="fa-solid fa-dragon"></i></a>
        </div>
        <div class="nav-bottom">
            <a href="#" id="btn-chat" title="Global Chat"><i class="fa-solid fa-comment-dots"></i></a>
        </div>
    </nav>

    <main class="content">
        <section id="hero" class="hero">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1 id="hero-title"></h1>
                <div class="hero-meta">
                    <span id="hero-rating" class="rating"></span>
                    <span id="hero-year"></span>
                </div>
                <p id="hero-desc"></p>
                <div class="hero-actions">
                    <button id="hero-play" class="btn-primary"><i class="fa-solid fa-play"></i> Play</button>
                    <button id="hero-info" class="btn-secondary"><i class="fa-solid fa-circle-info"></i> More Info</button>
                </div>
            </div>
        </section>

        <div class="rows-container" id="main-rows"></div>
    </main>

    <div id="details-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-hero">
                <div class="modal-hero-overlay"></div>
                <iframe id="modal-trailer" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
                <img id="modal-backdrop" src="" alt="">
            </div>
            <div class="modal-body">
                <div class="modal-info-left">
                    <h2 id="modal-title"></h2>
                    <div class="modal-meta">
                        <span id="modal-rating" class="rating"></span>
                        <span id="modal-runtime"></span>
                        <span id="modal-date"></span>
                    </div>
                    <p id="modal-desc"></p>
                    <div class="modal-actions-row">
                        <button id="modal-play" class="btn-primary"><i class="fa-solid fa-play"></i> Play</button>
                        <button id="modal-watch-later" class="btn-icon"><i class="fa-solid fa-plus"></i></button>
                        <button id="modal-like" class="btn-icon"><i class="fa-solid fa-thumbs-up"></i></button>
                        <span id="like-count" class="count-display">0</span>
                        <button id="modal-dislike" class="btn-icon"><i class="fa-solid fa-thumbs-down"></i></button>
                    </div>
                    <div id="series-selector" class="hidden">
                        <select id="season-select"></select>
                        <div id="episodes-list" class="episodes-container"></div>
                    </div>
                </div>
                <div class="modal-info-right">
                    <div class="cast-section">
                        <h3>Cast</h3>
                        <div id="modal-cast" class="cast-list"></div>
                    </div>
                </div>
            </div>
            <div class="comments-section">
                <h3>Discussion</h3>
                <div class="comment-input">
                    <input type="text" id="new-comment" placeholder="What did you think?">
                    <button id="post-comment"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
                <div id="comments-list"></div>
            </div>
        </div>
    </div>

    <div id="player-overlay" class="player-overlay">
        <button id="close-player"><i class="fa-solid fa-arrow-left"></i> Back</button>
        <button id="mark-finished" class="btn-secondary" style="position: absolute; top: 20px; right: 20px; z-index: 9999;"><i class="fa-solid fa-check"></i> Mark Finished</button>
        <iframe id="video-frame" src="" frameborder="0" allowfullscreen></iframe>
    </div>

    <div id="chat-panel" class="chat-panel">
        <div class="chat-header">
            <h3>CINEHUB</h3>
            <button id="close-chat"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type a message...">
            <button id="send-chat"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
