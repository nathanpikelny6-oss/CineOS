<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamX Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="sidebar">
        <div class="nav-links">
            <a href="#" class="nav-item" id="nav-search"><i class="fas fa-search"></i><span>Search</span></a>
            <a href="#" class="nav-item active" id="nav-home"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="#" class="nav-item" id="nav-shuffle"><i class="fas fa-random"></i><span>Surprise Me</span></a>
            <a href="#" class="nav-item" id="nav-trending"><i class="fas fa-fire"></i><span>Trending</span></a>
            <a href="#" class="nav-item" id="nav-tv"><i class="fas fa-tv"></i><span>Series</span></a>
            <a href="#" class="nav-item" id="nav-movies"><i class="fas fa-film"></i><span>Movies</span></a>
            <a href="#" class="nav-item" id="nav-list"><i class="fas fa-plus"></i><span>My List</span></a>
            <a href="#" class="nav-item" id="nav-crunchy"><i class="fas fa-star"></i><span>Crunchyroll</span></a>
        </div>
        <div class="nav-profile">
            <a href="#" class="nav-item"><i class="fas fa-user-circle"></i><span>Profile</span></a>
        </div>
    </nav>

    <div id="hero-container">
        <video id="hero-video" autoplay loop muted playsinline src="Netflix.mp4"></video>
        <div class="hero-vignette"></div>
        <div class="hero-content">
            <h1 id="hero-title">Loading...</h1>
            <div class="hero-meta">
                <span class="rating-badge" id="hero-rating">Top 10</span>
                <span id="hero-desc">Discovering the best content for you...</span>
            </div>
            <div class="hero-actions">
                <button class="btn btn-primary" id="hero-play"><i class="fas fa-play"></i> Play</button>
                <button class="btn btn-secondary" id="hero-info"><i class="fas fa-info-circle"></i> More Info</button>
            </div>
        </div>
    </div>

    <main id="main-content">
        <div id="rows-container"></div>
    </main>

    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal"><i class="fas fa-times"></i></button>
            <div class="modal-hero">
                <video autoplay loop muted playsinline src="Netflix.mp4" class="modal-bg-video"></video>
                <div class="modal-vignette"></div>
                <div class="modal-info-layer">
                    <h2 id="modal-title"></h2>
                    <div class="modal-actions-row">
                        <button class="btn btn-primary" id="modal-play"><i class="fas fa-play"></i> Play</button>
                        <button class="icon-btn" id="modal-add-list"><i class="fas fa-plus"></i></button>
                        <button class="icon-btn" id="modal-like"><i class="fas fa-thumbs-up"></i></button>
                        <button class="icon-btn" id="modal-dislike"><i class="fas fa-thumbs-down"></i></button>
                        <span id="modal-likes-count" class="likes-counter"></span>
                    </div>
                    <p id="modal-desc" class="modal-description"></p>
                    <div class="modal-meta-cast" id="modal-cast"></div>
                </div>
            </div>
            <div class="modal-bottom-sections">
                <div id="seasons-container" class="hidden">
                    <select id="season-selector"></select>
                    <div id="episodes-list"></div>
                </div>
                <div class="recommendations-section">
                    <h3>More Like This</h3>
                    <div id="modal-recs" class="recs-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="player-modal" class="modal">
        <div class="player-wrapper">
            <button class="close-player"><i class="fas fa-arrow-left"></i></button>
            <iframe id="video-frame" allowfullscreen></iframe>
        </div>
    </div>

    <div id="completion-prompt" class="hidden">
        <div class="prompt-box">
            <h3>Did you finish watching?</h3>
            <p>We can clear this from your continue watching list.</p>
            <div class="prompt-actions">
                <button id="btn-keep-watching" class="btn btn-secondary">Keep Watching</button>
                <button id="btn-mark-watched" class="btn btn-primary">Mark as Watched</button>
            </div>
        </div>
    </div>

    <div id="chat-widget">
        <div class="chat-header">
            <span><i class="fas fa-comments"></i> Global Chat</span>
            <button id="chat-toggle"><i class="fas fa-chevron-up"></i></button>
        </div>
        <div class="chat-body" id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Say something...">
            <button id="chat-send"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
