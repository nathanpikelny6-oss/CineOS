<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Invite</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #313338;
            font-family: "gg sans", "Noto Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #dbdee1;
        }
        .message-container {
            display: flex;
            width: 100%;
            max-width: 650px;
            padding: 16px;
            box-sizing: border-box;
            background-color: #313338;
        }
        .message-container:hover {
            background-color: #2e3035;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #5865F2;
            margin-right: 16px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .avatar svg {
            width: 24px;
            height: 24px;
            fill: #ffffff;
        }
        .content {
            flex: 1;
            min-width: 0;
        }
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
        }
        .username {
            color: #f2f3f5;
            font-size: 16px;
            font-weight: 500;
            line-height: 1.375;
            cursor: pointer;
        }
        .username:hover {
            text-decoration: underline;
        }
        .bot-tag {
            background-color: #5865F2;
            color: #ffffff;
            font-size: 10px;
            font-weight: 500;
            line-height: 1.3;
            padding: 1px 4px;
            border-radius: 3px;
            margin-left: 4px;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
        }
        .bot-tag svg {
            width: 14px;
            height: 14px;
            margin-right: 2px;
        }
        .timestamp {
            color: #949ba4;
            font-size: 12px;
            margin-left: 8px;
        }
        .message-text {
            font-size: 16px;
            line-height: 1.5;
            color: #dbdee1;
            margin-bottom: 8px;
        }
        .invite-embed {
            background-color: #2b2d31;
            border-radius: 4px;
            padding: 16px;
            max-width: 432px;
            width: 100%;
            box-sizing: border-box;
        }
        .invite-header {
            color: #b5bac1;
            font-size: 12px;
            font-weight: 700;
            line-height: 16px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .invite-body {
            display: flex;
            align-items: center;
        }
        .server-icon {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            background-color: #1e1f22;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .server-icon svg {
            width: 28px;
            height: 28px;
            fill: #f2f3f5;
        }
        .server-details {
            margin-left: 16px;
            flex: 1;
            min-width: 0;
        }
        .server-name {
            color: #f2f3f5;
            font-size: 16px;
            font-weight: 600;
            line-height: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }
        .server-stats {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .status-dot.online {
            background-color: #23a559;
        }
        .status-dot.offline {
            background-color: #80848e;
        }
        .stat-value {
            color: #b5bac1;
            font-size: 14px;
            font-weight: 500;
            line-height: 16px;
        }
        .btn-join {
            background-color: #248046;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            line-height: 16px;
            padding: 2px 16px;
            height: 32px;
            border-radius: 3px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: background-color 0.17s ease;
            margin-left: 16px;
            flex-shrink: 0;
        }
        .btn-join:hover {
            background-color: #1a6334;
        }
        .qr-section {
            margin-top: 12px;
            background-color: #2b2d31;
            border-radius: 4px;
            padding: 16px;
            max-width: 432px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .qr-title {
            color: #b5bac1;
            font-size: 12px;
            font-weight: 700;
            line-height: 16px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .qr-container {
            background-color: #ffffff;
            padding: 8px;
            border-radius: 4px;
            display: inline-block;
        }
        .qr-image {
            width: 120px;
            height: 120px;
            display: block;
        }
        @media (max-width: 500px) {
            .invite-body {
                flex-direction: column;
                align-items: flex-start;
            }
            .server-details {
                margin-left: 0;
                margin-top: 12px;
                margin-bottom: 12px;
            }
            .btn-join {
                margin-left: 0;
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="message-container">
        <div class="avatar">

            </svg>
        </div>
        <div class="content">

            <div class="qr-section">
                <div class="qr-title">Or scan to join</div>
                <div class="qr-container">
                    <img class="qr-image" src="https://quickchart.io/qr?text=https://discord.gg/YE6ZrFC6y&size=120&margin=0&dark=000000&light=ffffff" alt="Join QR Code">

        </div>
    </div>
</body>
</html>
