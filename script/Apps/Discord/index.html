<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invite</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }
        .card {
            background-color: #0c0c0c;
            border: 1px solid #222222;
            border-radius: 8px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }
        .invite-part {
            padding: 16px;
            width: 432px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .header {
            color: #888888;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .content {
            display: flex;
            align-items: center;
        }
        .icon {
            width: 50px;
            height: 50px;
            background-color: #1a1a1a;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            border: 1px solid #333333;
        }
        .icon svg {
            width: 24px;
            height: 24px;
            color: #ffffff;
        }
        .info {
            margin-left: 16px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .name {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
        }
        .stats {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .dot.online {
            background-color: #ffffff;
        }
        .dot.offline {
            background-color: #555555;
        }
        .stat-text {
            color: #999999;
            font-size: 14px;
        }
        .join-btn {
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            margin-left: 16px;
            transition: background-color 0.2s ease;
        }
        .join-btn:hover {
            background-color: #cccccc;
        }
        .divider {
            width: 1px;
            background-color: #222222;
        }
        .qr-part {
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background-color: #050505;
        }
        .qr-img {
            width: 80px;
            height: 80px;
            border-radius: 4px;
            background-color: #ffffff;
            padding: 4px;
        }
        .qr-text {
            color: #666666;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        @media (max-width: 650px) {
            .card {
                flex-direction: column;
                width: 90%;
                max-width: 432px;
            }
            .invite-part {
                width: 100%;
            }
            .divider {
                width: 100%;
                height: 1px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="invite-part">
            <div class="header">You've been invited to join a server</div>
            <div class="content">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                        <polyline points="2 17 12 22 22 17"></polyline>
                        <polyline points="2 12 12 17 22 12"></polyline>
                    </svg>
                </div>
                <div class="info">
                    <div class="name">Community Server</div>
                    <div class="stats">
                        <div class="stat">
                            <div class="dot online"></div>
                            <span class="stat-text">142 Online</span>
                        </div>
                        <div class="stat">
                            <div class="dot offline"></div>
                            <span class="stat-text">843 Members</span>
                        </div>
                    </div>
                </div>
                <a href="https://discord.gg/YE6ZrFC6y" class="join-btn">Join</a>
            </div>
        </div>
        <div class="divider"></div>
        <div class="qr-part">
            <img class="qr-img" src="https://quickchart.io/qr?text=https://discord.gg/YE6ZrFC6y&size=100&margin=0&dark=000000&light=ffffff" alt="QR Code">
            <span class="qr-text">Scan to join</span>
        </div>
    </div>
</body>
</html>
